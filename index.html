<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ravello</title>



  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f0f0f;
      color:white;
    }

    header{
      padding:25px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#111;
      border-bottom:1px solid #222;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:rgb(255, 246, 192);
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
    }

    .hero{
      height:500px;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      background:linear-gradient(to right,#111,#1d1d1d);
    }

    .hero h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero p{
      color:#aaa;
      margin-bottom:30px;
      font-size:20px;
    }

    .hero button{
      padding:15px 35px;
      border:none;
      border-radius:10px;
      background:gold;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
    }

    .products{
      padding:60px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
    }

    .card{
      background:#f8f4ee;
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .card h2{
      margin-bottom:10px;
    }

    .price{
      color:rgb(255, 250, 223);
      font-size:24px;
      margin:15px 0;
    }

    .buy{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:rgb(255, 250, 221);
      font-weight:bold;
      cursor:pointer;
    }

  </style>

</head>
<body>

  <header>
    <div class="logo">Ravello</div>


    <nav>
      <a href="">Ana Sayfa</a>
      <a href="">Ürünler</a>
      <a href="">İletişim</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Premium Ürünler</h1>
    <p>Kaliteli ve elit ürünler burada.</p>
    <button>Alışverişe Başla</button>
  </section>

  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" />

      <div class="card-content">
        <h2>Nike Ayakkabı</h2>
        <div class="price">₺3999</div>
        <button class="buy">Sepete Ekle</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" />

      <div class="card-content">
        <h2>Premium Saat</h2>
        <div class="price">₺5499</div>
        <button class="buy">Sepete Ekle</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e" />

      <div class="card-content">
        <h2>Kulaklık</h2>
        <div class="price">₺2799</div>
        <button class="buy">Sepete Ekle</button>
      </div>
    </div>

  </section>

</body>
</html>
