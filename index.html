<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ravello</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#f8f4ee;
      color:#2b2b2b;
      line-height:1.6;
    }

    header{
      position:sticky;
top:0;
z-index:1000;
      padding:25px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#white;
      border-bottom:1px solid #222;
    }

    .logo{
      font-size:28px;
      letter-spacing:4px;
      font-weight:bold;
      color:#d8c3a5;
    }

    nav a{
      color:#3a3128;
      nav a:hover{
  color:#d8c3a5;
  transition:0.3s;
}
      text-decoration:none;
      margin-left:20px;
    }

    .hero{
      height:500px;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-weight:600;
letter-spacing:2px;
color:#3a3128;
      text-align:center;
      background:linear-gradient(to right,#f8f4ee,#efe4d3);
    }

    .hero h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero p{
      color:#7d6e5d;
      margin-bottom:30px;
      font-size:20px;
    }

    .hero button{
      padding:15px 35px;
      border:none;
      border-radius:10px;
      background:#d8c3a5;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      .hero button:hover{
  background:#c8af8d;
  transform:scale(1.05);
}
      font-weight:bold;
      .section-title{
  text-align:center;
  margin-top:80px;
  font-size:40px;
  color:#3a3128;
  font-weight:600;
}
    .proucts{

  
      padding:60px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
    }

    .card{
      background:#f8f4ee;
      border-radius:20px;
      border:1px solid #eee;
      overflow:hidden;
      transition:0.3s;
      box-shadow:0 5px 25px rgba(0,0,0,0.08);
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .card h2{
      margin-bottom:10px;
    }

    .price{
      color:#d8c3a5;
      font-size:24px;
      margin:15px 0;
    }

    .buy{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:rgb(255, 250, 221);
      font-weight:bold;
      cursor:pointer;
    }

  footer{
  margin-top:80px;
  padding:40px;
  text-align:center;
  background:white;
  color:#7d6e5d;
  border-top:1px solid #eee;
}</style>

</head>
<body>

  <header>
    <div class="logo">Ravello</div>


    <nav>
      <a href="">Ana Sayfa</a>
      <a href="">Ürünler</a>
      <a href="">İletişim</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Premium Ürünler</h1>
    <p>Minimal ve premium takılar Ravello’da.</p>
    <button>Alışverişe Başla</button>
  </section>
<
 <h2 class="section-title">Öne Çıkan Takılar</h2>
  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" />

      <div class="card-content">
        <h2>Çelik Kolye</h2>
        <div class="price">₺179</div>
        <button class="buy">Sepete Ekle</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" />

      <div class="card-content">
        <h2>Çelik Küpe</h2>
        <div class="price">₺189</div>
        <button class="buy">Sepete Ekle</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e" />

      <div class="card-content">
        <h2>Halhal</h2>
        <div class="price">₺179</div>
        <button class="buy">Sepete Ekle</button>
      </div>
    </div>

  </section>
<footer>
  <p>© 2026 Ravello - Tüm Hakları Saklıdır.</p>
</footer>
</body>
</html>
